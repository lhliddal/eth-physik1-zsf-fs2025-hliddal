repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: check-main-full
        name: check main.tex full-build mode
        entry: ./tests/check_main_full.sh
        language: system
        files: '^main\.tex$'

      - id: check-root-clean
        name: check root directory is clean
        entry: ./tests/check_root_clean.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: latexindent
        name: latexindent (project style)
        entry: >-
          bash -lc 'command -v latexindent >/dev/null 2>&1 && perl -MFile::HomeDir -e 1 >/dev/null 2>&1 || { echo "Skipping latexindent hook (missing Perl module File::HomeDir)"; exit 0; }; latexindent -w -s -l=.latexindent.yaml "$@"' --
        language: system
        files: '\.(tex|sty|cls)$'

      - id: chktex
        name: chktex (LaTeX lint)
        entry: chktex -q -n1 -n3 -n6 -n8 -n13 -n18 -n35 -n36 -n44
        language: system
        files: '\.(tex|sty|cls)$'
